name: Bug report
description: Report a runtime, packaging, CLI, or documentation problem.
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: PyPI version, git commit, or branch.
      placeholder: 0.1.0 or 3e4440d

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - PyPI
        - pipx
        - GitHub ZIP
        - Local editable install
        - Other
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - ollama
        - anthropic
        - openai
        - not applicable
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command or code sample
      description: The exact command or minimal code that reproduces the issue.
      render: bash

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, shell, and any other relevant context.
      placeholder: Windows 11, Python 3.13, PowerShell
