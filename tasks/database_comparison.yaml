  processing 10 million rows on a single machine. Cover:
  1. Query speed for aggregation queries
  2. Memory usage under load
  3. Operational complexity (setup, maintenance, backups)
  4. Ecosystem maturity (libraries, tooling, community)

  Return a structured comparison with a clear recommendation.

